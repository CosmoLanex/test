<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NUKRAX.TR</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  background:#0a0a0a;
  color:#f5f5f5;
  font-family:Arial;
  margin:0;
  padding:20px;
}

h1 {text-align:center;}

.container {max-width:1000px;margin:auto;}

.card {
  background:#1a1a1a;
  padding:15px;
  margin:10px 0;
  border-radius:10px;
}

input, select, button {
  margin:5px;
  padding:8px;
  border:none;
  border-radius:5px;
}

button {
  background:#4da3ff;
  color:white;
  cursor:pointer;
}

table {
  width:100%;
  margin-top:10px;
  border-collapse:collapse;
}

td, th {
  border:1px solid #333;
  padding:8px;
  text-align:center;
}

canvas {
  background:#111;
  margin-top:20px;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="container">
<h1>NUKRAX.TR</h1>

<div class="card">
<h3>Add Trade</h3>
<input type="datetime-local" id="date">
<select id="type">
<option>Buy</option>
<option>Sell</option>
</select>
<input type="number" id="profit" placeholder="Profit ($)">
<select id="result">
<option>Win</option>
<option>Loss</option>
</select>
<button onclick="addTrade()">Save</button>
</div>

<div class="card">
<h3>Dashboard</h3>
<p id="stats"></p>
</div>

<div class="card">
<h3>Trades</h3>
<table>
<thead>
<tr>
<th>Date</th>
<th>Type</th>
<th>Result</th>
<th>Profit</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>
</div>

<div class="card">
<h3>Win Rate</h3>
<canvas id="winChart"></canvas>
</div>

<div class="card">
<h3>Equity Curve</h3>
<canvas id="equityChart"></canvas>
</div>

</div>

<script>

function getTrades() {
  return JSON.parse(localStorage.getItem("trades")) || [];
}

function saveTrades(data) {
  localStorage.setItem("trades", JSON.stringify(data));
}

function addTrade() {
  let trades = getTrades();

  trades.push({
    date: date.value,
    type: type.value,
    profit: Number(profit.value),
    result: result.value
  });

  saveTrades(trades);
  location.reload();
}

function updateUI() {
  let trades = getTrades();
  let wins = 0;
  let profit = 0;
  let tableHTML = "";

  trades.forEach((t, i) => {
    if (t.result === "Win") wins++;
    profit += t.profit;

    tableHTML += `
      <tr>
        <td>${t.date}</td>
        <td>${t.type}</td>
        <td>${t.result}</td>
        <td>${t.profit}</td>
      </tr>
    `;
  });

  let winRate = trades.length ? ((wins / trades.length) * 100).toFixed(2) : 0;

  document.getElementById("stats").innerText =
    `Trades: ${trades.length} | Win Rate: ${winRate}% | Profit: $${profit}`;

  document.getElementById("table").innerHTML = tableHTML;

  buildCharts(trades);
}

function buildCharts(trades) {
  let winData = [];
  let equity = [];
  let wins = 0;
  let sum = 0;

  trades.forEach((t, i) => {
    if (t.result === "Win") wins++;
    winData.push((wins / (i + 1)) * 100);

    sum += t.profit;
    equity.push(sum);
  });

  new Chart(winChart, {
    type: "line",
    data: {
      labels: trades.map((_, i) => i + 1),
      datasets: [{
        data: winData,
        borderColor: "#4da3ff",
        tension: 0.4
      }]
    }
  });

  new Chart(equityChart, {
    type: "line",
    data: {
      labels: trades.map((_, i) => i + 1),
      datasets: [{
        data: equity,
        borderColor: "lime",
        tension: 0.4
      }]
    }
  });
}

updateUI();

</script>

</body>
</html>
